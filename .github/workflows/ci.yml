name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # No install needed: the app and tests use only Node built-ins.
      - name: Syntax check
        run: node scripts/syntax-check.mjs
      - name: Generate icon (smoke test the generator)
        run: node overlay/make-icon.mjs
      - name: Unit + integration tests
        run: npm test
