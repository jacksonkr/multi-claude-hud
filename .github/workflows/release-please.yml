name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Maintains a release PR (version bump + CHANGELOG from Conventional
      # Commits). Merging that PR tags a GitHub Release.
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
